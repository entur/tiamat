# Default configuration shipped with the application jar.
#
# Contains environment-neutral defaults only (Category A: identical in all environments,
# describes application behaviour). Environment-specific values (GCP project ids, bucket
# names, Auth0 issuers) are supplied as environment variables by the deployment.
# Entur-specific constants live in application-entur.properties (profile 'entur').
#
# Keys whose value equals the built-in @Value code default are intentionally NOT repeated
# here (authorization.enabled, graphql.query.max.depth, publicationDelivery*.validateAgainstSchema,
# changelog.topic.name, tiamat.hazelcast.*, netex.validPrefix).

server.port=8777
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

spring.main.allow-bean-definition-overriding=true

# JPA / Hibernate
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.jakarta.persistence.query.timeout=30000
spring.jpa.properties.hibernate.cache.region.factory_class=com.hazelcast.hibernate.HazelcastCacheRegionFactory
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_minimal_puts=true
spring.jpa.properties.hibernate.cache.use_query_cache=true

spring.datasource.hikari.maximumPoolSize=30

# Schema history table kept at its pre-Flyway-5 name; the table exists under this name in all databases
spring.flyway.table=schema_version

# Application behaviour
tariffzoneLookupService.resetReferences=true
nearbyStopsWithSameTypeFinder.limits={railStation:'200',airport:'3000'}

# Logging
logging.level.org.rutebanken.tiamat=INFO
logging.level.org.rutebanken.tiamat.importer.finder=INFO
logging.level.org.rutebanken.tiamat.dtoassembling.disassembler.StopPlaceSearchDisassembler=WARN
logging.level.org.rutebanken.tiamat.rest.netex.publicationdelivery=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.tool.hbm2ddl=INFO
logging.level.org.hibernate.type=WARN
logging.level.org.hibernate.id.enhanced=INFO
logging.level.io.micrometer.prometheus=WARN
logging.level.org.geotools=WARN
logging.level.org.rutebanken.helper.organisation.ReflectionAuthorizationService=ERROR

# Spring Cloud AWS is not used by Entur (or local env), and these avoid it being autoconfigured:
spring.cloud.aws.secretsmanager.enabled=false
spring.cloud.aws.s3.enabled=false
