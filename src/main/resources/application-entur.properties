# Entur-specific constants, identical across dev/tst/prd.
#
# Activated via the 'entur' Spring profile, which is already part of spring.profiles.active
# in all Entur environments (gcs-blobstore,google-pubsub,entur). Only non-sensitive,
# environment-independent values belong here; environment facts (project ids, bucket names,
# Auth0 issuers/audiences/client ids, internal service URLs) are environment variables in
# the helm chart.

# Norwegian NeTEx stops profile
netex.profile.version=1.15:NO-NeTEx-stops:1.5
netex.id.valid.prefix.list={TopographicPlace:{'KVE','WOF','OSM','ENT','LAN'},TariffZone:{'*'},FareZone:{'*'},GroupOfTariffZones:{'*'}}

# Only MERGE imports are allowed against the national register
netex.import.enabled.types=MERGE

changelog.publish.enabled=true

# Path within the GCS export bucket
blobstore.gcs.blob.path=export

# Role assignments come from baba (the organisation registry)
tiamat.security.role.assignment.extractor=baba

spring.security.oauth2.client.registration.internal.authorization-grant-type=client_credentials
