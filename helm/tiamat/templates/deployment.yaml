apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" . | indent 4 }}
spec:
  progressDeadlineSeconds: 600
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.deployment.name }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
    type: RollingUpdate
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
        prometheus.io/path: /health/scrape
        prometheus.io/port: "{{ .Values.service.http.internalPort }}"
        prometheus.io/scrape: 'true'
      labels:
        {{- include "common.labels" . | indent 8 }}
    spec:
      containers:
        - name: cloudsql-proxy
          image: gcr.io/cloudsql-docker/gce-proxy:1.30.1
          imagePullPolicy: IfNotPresent
          command:
            - /cloud_sql_proxy
            - -instances={{ .Values.sql.instance }}
            - -log_debug_stdout
          resources:
            requests:
              cpu: 50m
              memory: 40Mi
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 28
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
        - name: {{ .Values.deployment.name }}
          image: {{ .Values.image.identifier }}
          imagePullPolicy: {{ .Values.image.imagePullPolicy }}
          env:
            - name: JDK_JAVA_OPTIONS
              value: -server -Xss{{ .Values.resources.xss }} -Xmx{{ .Values.resources.xmx }}
                -Dfile.encoding=UTF-8
                -Dhazelcast.ignoreXxeProtectionFailures=true
                --add-modules java.se
                --add-exports java.base/jdk.internal.ref=ALL-UNNAMED
                --add-opens java.base/java.lang=ALL-UNNAMED
                --add-opens java.base/sun.nio.ch=ALL-UNNAMED
                --add-opens java.management/sun.management=ALL-UNNAMED
                --add-opens jdk.management/com.sun.management.internal=ALL-UNNAMED
            - name: TZ
              value: Europe/Oslo
            - name: SERVER_PORT
              value: "{{ .Values.service.http.internalPort }}"
            - name: SPRING_PROFILES_ACTIVE
              value: gcs-blobstore,google-pubsub,entur
            # Database via cloudsql-proxy sidecar
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://localhost:5432/{{ .Values.deployment.name }}
            - name: SPRING_DATASOURCE_USERNAME
              value: tiamat
            # GCS blobstore
            - name: BLOBSTORE_GCS_BUCKET_NAME
              value: "{{ .Values.gcp.gcsBucketName }}"
            - name: BLOBSTORE_GCS_PROJECT_ID
              value: "{{ .Values.gcp.blobstoreProjectId }}"
            # pubsub
            - name: SPRING_CLOUD_GCP_PROJECT_ID
              value: "{{ .Values.gcp.pubsubProjectId }}"
            # External farezone
            - name: FAREZONE_EXTERNALVERSIONING
              value: "{{ .Values.farezone.externalVersioning }}"
            # Organisation registry (role assignments)
            - name: TIAMAT_USER_PERMISSION_REST_SERVICE_URL
              value: "{{ .Values.organisation.service }}/services/organisations/users"
            # OAuth2 Resource Server for Entur Partner tenant
            - name: TIAMAT_OAUTH2_RESOURCESERVER_AUTH0_ENTUR_PARTNER_JWT_ISSUER_URI
              value: "{{ .Values.auth0.entur.partner.url }}"
            - name: TIAMAT_OAUTH2_RESOURCESERVER_AUTH0_ENTUR_PARTNER_JWT_AUDIENCE
              value: "{{ .Values.auth0.entur.partner.audience }}"
            # OAuth2 Resource Server for Entur internal tenant
            - name: TIAMAT_OAUTH2_RESOURCESERVER_AUTH0_ENTUR_INTERNAL_JWT_ISSUER_URI
              value: "{{ .Values.auth0.entur.internal.url }}"
            - name: TIAMAT_OAUTH2_RESOURCESERVER_AUTH0_ENTUR_INTERNAL_JWT_AUDIENCE
              value: "{{ .Values.auth0.entur.internal.audience }}"
            # OAuth Entur Internal client
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_INTERNAL_CLIENT_ID
              value: "{{ .Values.auth0.client.id }}"
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_INTERNAL_TOKEN_URI
              value: "{{ .Values.auth0.client.url }}"
            - name: TIAMAT_OAUTH2_CLIENT_AUDIENCE
              value: "{{ .Values.auth0.client.audience }}"
          envFrom:
            - secretRef:
                name: tiamat-psql-credentials
            - secretRef:
                name: auth-internal-credentials
          resources:
            limits:
              memory: {{ .Values.resources.memLimit }}
            requests:
              cpu: {{ .Values.resources.cpuRequest }}
              memory: {{ .Values.resources.memRequest }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.service.http.internalPort }}
              name: http
              protocol: TCP
            - containerPort: {{ .Values.service.jolokia.internalPort }}
              name: jolokia
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health/live
              port: {{ .Values.service.http.internalPort }}
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 30
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health/ready
              port: {{ .Values.service.http.internalPort }}
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 20
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      serviceAccountName: application
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
      terminationGracePeriodSeconds: 31
      topologySpreadConstraints:
        - maxSkew: 3
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Values.deployment.name }}
        - maxSkew: 5
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Values.deployment.name }}
